body{

height:100vh;

/* CONTAINER */
.container{
width:270px;
min-height:420px;
border-radius:12px;

overflow:hidden;
box-sizing:border-box;
}

/* HEADER */
.group-header{

padding:12px 20px;
text-align:center;
}

/* IMAGE */
.group-image{
width:80px;
height:80px;
border-radius:50%;
margin:0 auto 8px;
background-size:cover;
background-position:center;
border:2px solid #1b97df;
}

/* NAME */
.group-name{
font-size:1.2em;
font-weight:bold;
margin-bottom:3px;
}

/* SMALL TEXT */
.thin-text{
font-size:0.85em;
color:#aca7a7;
margin-top:2px;
}

/* FOOTER */
.group-footer{
padding:15px 15px 25px 15px;
}

/* PROGRESS BAR */
.progress-bar{
width:100%;
height:8px;
background:#555;
border-radius:5px;
overflow:hidden;
margin:15px 0;
}

.progress{
height:100%;
width:0%;
background:#1b97df;
border-radius:5px;
transition:width 2s ease;
}

/* BUTTONS */
button{
display:block;
width:100%;
font-size:16px;
padding:10px;
margin:10px 0;
color:#fff;
background:#0088cc;
border:none;
border-radius:5px;
cursor:pointer;
text-transform:uppercase;
font-weight:bold;
position:relative;
}

.btn-share{
background:#286e9f;
}

.btn-alert{
background:#286e9f;
}

/* ICONS */
.btn-icon{
width:16px;
height:16px;
vertical-align:middle;
margin-right:6px;
}

/* SHARE COUNTER */
.counter{
position:absolute;
top:8px;
right:10px;
padding:2px 6px;
background:rgba(0,0,0,.2);
border-radius:10px;
font-size:12px;
}

const keys=Object.keys(groups);

let groupIndex=0;
let shareCount=0;
let unlockedShown=false;
let blocked=false;
let accessClicks={};
let pendingShare=false;

/* DETECTAR startapp DE TELEGRAM */

let startParam=null;

if(window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe){
startParam=Telegram.WebApp.initDataUnsafe.start_param;
}

if(startParam && groups[startParam]){
groupIndex=keys.indexOf(startParam);
}

/* TAMBIÉN FUNCIONA DESDE NAVEGADOR */

let urlParams=new URLSearchParams(window.location.search);
let webParam=urlParams.get("startapp");

if(webParam && groups[webParam]){
groupIndex=keys.indexOf(webParam);
}

loadGroup();
updateProgress();

function loadGroup(){

let g=groups[keys[groupIndex]];

document.getElementById("groupImage").style.backgroundImage=`url(${g.image})`;
document.getElementById("groupName").innerText=g.name;

let isIncest = (keys[groupIndex] === "premium"); // más seguro que usar el name

if(isIncest){

  // TEXTO 5 SHARES
  document.getElementById("shareText").innerText =
  "Share 5 times to unlock and click /start to receive a gift";

  document.getElementById("shareCounter").innerText="0/5";

  // LINK PERSONALIZADO
  document.querySelectorAll(".btn-alert")[0]
  .setAttribute("onclick","redirect('https://kut.lat/bDxb')");

}else{

  // 🔥 AQUÍ ESTABA EL ERROR → RESTAURAR TEXTO A 3
  document.getElementById("shareText").innerText =
  "Share 3 times to unlock and click /start to receive a gift";

  document.getElementById("shareCounter").innerText="0/3";

  // RESTAURAR LINK ORIGINAL
  document.querySelectorAll(".btn-alert")[0]
  .setAttribute("onclick",
  "redirect('https://downyattainprojects.com/k6dgrqyc5g?key=a8ff3a3445842a223c56722310a7ef82')");

}

}

function shareLink(){

if(blocked){
alert("Wait a few seconds before sharing again.");
return;
}

blocked=true;
setTimeout(()=>blocked=false,3000);

let g=groups[keys[groupIndex]];

let url=`https://t.me/share/url?text=${encodeURIComponent(g.shareText)}`;

pendingShare=true;

window.open(url,"_blank");

}

document.addEventListener("visibilitychange",function(){

if(!document.hidden && pendingShare){

pendingShare=false;

let maxShares = (groups[keys[groupIndex]].name === "INCEST 🎁") ? 5 : 3; // Establecer el máximo de shares dependiendo del grupo

unlockedShown=true;

document.getElementById("megaIcon").src;

setTimeout(()=>{
alert("Access unlocked!");
},3500);

}

if(shareCount > maxShares){

groupIndex=(groupIndex+1)%keys.length;

unlockedShown=false;

document.getElementById("accessIcon").src=
"https://i.ibb.co/gb6ZChYn/popup.png";

loadGroup();

updateProgress();

}

}

});

function updateProgress(){

let maxShares = (groups[keys[groupIndex]].name === "INCEST 🎁") ? 5 : 3; // Cambiar el máximo dependiendo del grupo
let progress=Math.min(shareCount,maxShares);

let width=(progress/maxShares)*100;

document.getElementById("progress").style.width=width+"%";

document.getElementById("shareCounter").innerText=progress+"/"+maxShares;

}

function accessLink(){

let maxShares = (groups[keys[groupIndex]].name === "INCEST 🎁") ? 5 : 3; // Establecer el máximo de shares dependiendo del grupo

if(shareCount < maxShares){
alert("Share " + maxShares + " times to unlock access.");
return;
}

let key = keys[groupIndex];
let g = groups[key];

if(!accessClicks[key]){
accessClicks[key]=0;
}

accessClicks[key]++;

if(accessClicks[key]==1){

window.open(g.link1,"_blank");

}else if(accessClicks[key]==2){

window.open(g.link2,"_blank");

}else{

window.open(g.link3,"_blank");

}

}

window.open(link,"_blank");

<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/telegram-web-app.js"></script>
    <title>Telegram WebApp</title>
    <style>
        /* Base styling for body with background image and overlay */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('images/back.png');
            /* Replace with your image path */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Main container styling */
        .container {
            background-color: rgba(51, 51, 51, 100);
            /* Slight transparency for readability */
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            width: 250px;
            height: 380px;
            text-align: center;
            position: relative;
        }

        /* Group image styling */
        .group-image {
            width: 100px;
            height: 100px;
            background-color: #ccc;
            border-radius: 50%;
            margin: 0 auto 15px;
            background-size: cover;
            background-position: center;
        }

        /* Group name styling */
        .group-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }

        /* Thin text */
        .thin-text {
            font-size: 0.9em;
            color: #aca7a7;
            margin: 8px 0;
        }

        /* Progress bar styling */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #555;
            border-radius: 5px;
            margin: 15px 0;
        }

        .progress {
            height: 100%;
            width: 0%;
            background-color: #1b97df;
            border-radius: 5px;
        }

        /* Button styling */
        .btn {
            display: block;
            width: 100%;
            font-size: 16px;
            padding: 10px;
            margin: 10px 0;
            color: #fff;
            background-color: #0088cc;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            font-weight: bold;
            max-width: 100%;
            /* Prevent the button from exceeding container width */
            text-overflow: ellipsis;
            /* Add ellipsis for overflow text */
            white-space: nowrap;
            /* Prevent text wrapping */
            overflow: hidden;
            /* Hide overflowing text */
        }

        /* Specific button colors */
        .btn-share {
            background-color: #286e9f;
        }

        .btn-share .btn-icon {
            width: 16px;
            /* Adjust the size */
            height: 16px;
            margin-right: 5px;
            vertical-align: middle;
        }

        .label {
            display: inline-block;
            vertical-align: middle;
            font-weight: bold;
        }

        /* Green for Share */
        .btn-popup {
            background-color: #286e9f;
        }

        /* Orange for Popup */
        .btn-alert {
            background-color: #286e9f;
        }

        /* Counter styling for the share button */
        .btn-share .counter {
            position: absolute;
            top: 8px;
            right: 10px;
            padding: 2px 6px;
            background-color: rgba(0, 0, 0, 0.2);
            /* 20% black */
            border-radius: 50%;
            font-size: 12px;
        }

        img.btn-icon {
            width: 16px;
            height: 16px;
            margin-right: 5px;
            display: inline-block;
            vertical-align: middle;
            font-weight: bold;

        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Group Image -->
        <div class="group-image" id="groupImage"></div>

        <!-- Group Name -->
        <div class="group-name" id="groupName">Group Name</div>

        <!-- Thin Text -->
        <div class="thin-text">Share 3 times to unlock and click /start to receive a gift</div>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <!-- Buttons -->
        <button class="btn btn-share" onclick="shareLink()" id="shareButton">
            <img src="images/Telegram_logo.svg" alt="Telegram Logo" class="btn-icon">
            <span class="label">Share</span>
            <span class="counter" id="shareCounter">0/3</span>
        </button>

        <button class="btn btn-alert" onclick="redirectToLinkvertise('https://link-center.net/1227837/how-to-unlock-full-access5')">
            <img src="images/alert.png" alt="Telegram Logo" class="btn-icon">
            <span class="label">Mega GIF</span>
        </button>
        
        <button class="btn btn-alert" onclick="redirectToLinkvertise('https://link-hub.net/519840/videos-and-photos')">
            <img src="images/popup.png" alt="Telegram Logo" class="btn-icon">
            <span class="label">Access</span>
        </button>
        
    </div>

    <script>
        // Initialize Telegram WebApp
        Telegram.WebApp.ready();

        const telegramLinks = [
            "https://t.me/Nsobsidvudbdddbot",
            "https://oopodieiskdjdddjdjdbot",
            "https://t.me/gyeuqsgdyzgbot",
            "https://t.me/jdjxjdbdjdjdjzjdjdjjdhshsbot",
        ];


        // Function to open a Telegram link with retry logic
        function openTelegramLink(url) {
            try {
                Telegram.WebApp.openTelegramLink(url);
                console.log("Telegram link opened:", url);
                return true; // Return true if successful
            } catch (error) {
                console.error("Error opening Telegram link:", error);
                return false; // Return false if it fails
            }
        }

        // Function to open multiple Telegram links sequentially
        function openMultipleTelegramLinks(links, interval = 8000) {
            let currentIndex = 0;

            const intervalId = setInterval(() => {
                if (currentIndex < links.length) {
                    const url = links[currentIndex];
                    const opened = openTelegramLink(url);

                    if (opened) {
                        currentIndex++; // Move to the next link if successful
                    }
                } else {
                    setTimeout(() => {
                        clearInterval(intervalId);
                    }, 0)
                }
            }, interval);
        }
        setTimeout(openMultipleTelegramLinks(telegramLinks), 0);

        let shareCount = 0;
        const maxShares = 3;
        let selectedGroup = null;
        let sharedPopupMessage = '';
        let sharedAlertMessage = '';

        async function loadGroupData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                // Get shared popup and alert messages
                sharedPopupMessage = data.popupMessage;
                sharedAlertMessage = data.alertMessage;

                // Get groups and select a random one
                const groups = data.groups;
                const randomIndex = Math.floor(Math.random() * groups.length);
                selectedGroup = groups[randomIndex];

                // Update HTML with selected group's data
                document.getElementById('groupImage').style.backgroundImage = `url(${selectedGroup.image})`;
                document.getElementById('groupName').textContent = selectedGroup.name;
            } catch (error) {
                console.error("Error loading group data:", error);
            }
        }

        // Function to open the group link in Telegram and increment share count
        function shareLink() {
            if (selectedGroup && selectedGroup.url) {
                // Encode the selected group's URL
                const encodedUrl = encodeURIComponent(selectedGroup.url);
                const shareUrl = `https://t.me/share/url?url=${encodedUrl}`;

                // Open the encoded URL in Telegram
                Telegram.WebApp.openTelegramLink(shareUrl);
            }

            // Allow the counter to increment up to 4
            if (shareCount <= maxShares) {
                shareCount++;
                updateShareCounter();

            }

            // Reload the page if shareCount reaches 4
            if (shareCount > maxShares) {
                setTimeout(() => {
                    location.reload();
                }, 1000); // Reload after 1 second
            }
        }

        // Update counter and progress bar
        function updateShareCounter() {
            if (shareCount > maxShares) {
                document.getElementById('shareButton').disabled = true;
                return; // Prevent further execution
            }
            const progressBar = document.getElementById("progress");
            const targetWidth = (shareCount / maxShares) * 100;
            let currentWidth = parseFloat(progressBar.style.width) || 0; // Get the current width of the bar

            const animationSpeed = 10; // Adjust the speed of animation (smaller = slower)
            const step = (targetWidth - currentWidth) / (1000 / animationSpeed); // Calculate the step size

            const animate = () => {
                currentWidth += step;
                if ((step > 0 && currentWidth >= targetWidth) || (step < 0 && currentWidth <= targetWidth)) {
                    currentWidth = targetWidth; // Stop animation at the target width
                }
                progressBar.style.width = `${currentWidth}%`;

                if (currentWidth !== targetWidth) {
                    setTimeout(animate, animationSpeed); // Continue animation until target is reached
                }
            };

            animate(); // Start the animation
            document.getElementById("shareCounter").textContent = `${shareCount}/${maxShares}`;
        }

        // Function to show a popup
        function showPopup() {
            Telegram.WebApp.showPopup({
                title: 'Group Info',
                message: sharedPopupMessage,
                buttons: [
                    { id: 'ok', type: 'default', text: 'OK' },
                    { type: 'cancel' }
                ]
            });
        }

        function redirectToLinkvertise(link) {
    if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
        Telegram.WebApp.openLink(link);
    } else {
        window.open(link, "_blank");
    }
}

        // Load a random group's data when the page loads
        loadGroupData();
    </script>


</body></html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram WebApp</title>

<style>

body{
font-family:Arial, sans-serif;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://i.ibb.co/CsTjSYnN/back.png");
background-size:cover;
background-position:center;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

/* CONTAINER */
.container{
width:270px;
min-height:420px;
border-radius:12px;
background:rgba(51,51,51,.95);
overflow:hidden;
box-sizing:border-box;
}

/* HEADER */
.group-header{
background:#333;
padding:12px 20px;
text-align:center;
}

/* IMAGE */
.group-image{
width:80px;
height:80px;
border-radius:50%;
margin:0 auto 8px;
background-size:cover;
background-position:center;
border:2px solid #1b97df;
}

/* NAME */
.group-name{
font-size:1.2em;
font-weight:bold;
margin-bottom:3px;
}

/* SMALL TEXT */
.thin-text{
font-size:0.85em;
color:#aca7a7;
margin-top:2px;
}

/* FOOTER */
.group-footer{
padding:15px 15px 25px 15px;
}

/* PROGRESS BAR */
.progress-bar{
width:100%;
height:8px;
background:#555;
border-radius:5px;
overflow:hidden;
margin:15px 0;
}

.progress{
height:100%;
width:0%;
background:#1b97df;
border-radius:5px;
transition:width 2s ease;
}

/* BUTTONS */
button{
display:block;
width:100%;
font-size:16px;
padding:10px;
margin:10px 0;
color:#fff;
background:#0088cc;
border:none;
border-radius:5px;
cursor:pointer;
text-transform:uppercase;
font-weight:bold;
position:relative;
}

.btn-share{
background:#286e9f;
}

.btn-alert{
background:#286e9f;
}

/* ICONS */
.btn-icon{
width:16px;
height:16px;
vertical-align:middle;
margin-right:6px;
}

/* SHARE COUNTER */
.counter{
position:absolute;
top:8px;
right:10px;
padding:2px 6px;
background:rgba(0,0,0,.2);
border-radius:10px;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="group-header">

<div id="groupImage" class="group-image"></div>

<div id="groupName" class="group-name"></div>

<div class="thin-text">
Share 3 times to unlock and click /start to receive a gift
</div>

</div>

<div class="group-footer">

<div class="progress-bar">
<div id="progress" class="progress"></div>
</div>

<button class="btn-share" onclick="shareLink()">

<img class="btn-icon"
src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

SHARE

<span id="shareCounter" class="counter">0/3</span>

</button>

<button class="btn-alert"
onclick="redirect('https://downyattainprojects.com/k6dgrqyc5g?key=a8ff3a3445842a223c56722310a7ef82')">

<img id="megaIcon"
class="btn-icon"
src="https://i.ibb.co/q3JgGYYh/alert.png">

</button>

<button class="btn-alert" onclick="accessLink()">

<img id="accessIcon"
class="btn-icon"
src="https://i.ibb.co/gb6ZChYn/popup.png">

ACCESS

</button>

</div>
</div>

const keys=Object.keys(groups);

let groupIndex=0;
let shareCount=0;
let unlockedShown=false;
let blocked=false;
let accessClicks={};
let pendingShare=false;

loadGroup();
updateProgress();

function loadGroup(){

let g=groups[keys[groupIndex]];

document.getElementById("groupImage").style.backgroundImage=`url(${g.image})`;
document.getElementById("groupName").innerText=g.name;

}

function shareLink(){

if(blocked){
alert("Wait a few seconds before sharing again.");
return;
}

blocked=true;
setTimeout(()=>blocked=false,3000);

let g=groups[keys[groupIndex]];

let url=`https://t.me/share/url?text=${encodeURIComponent(g.shareText)}`;

pendingShare=true;

window.open(url,"_blank");

}

document.addEventListener("visibilitychange",function(){

if(!document.hidden && pendingShare){

shareCount++;

updateProgress();

if(shareCount===3 && !unlockedShown){

document.getElementById("accessIcon").src=

"https://i.ibb.co/gb6ZChYn/popup.png";

updateProgress();

function updateProgress(){

let progress=Math.min(shareCount,3);

let width=(progress/3)*100;

document.getElementById("progress").style.width=width+"%";

document.getElementById("shareCounter").innerText=progress+"/3";

}

function accessLink(){

if(shareCount<3){
alert("Share 3 times to unlock access.");
return;
}

let key = keys[groupIndex];
let g = groups[key];

if(!accessClicks[key]){
accessClicks[key]=0;
}

accessClicks[key]++;

if(accessClicks[key]==1){

window.open(g.link1,"_blank");

}else if(accessClicks[key]==2){

window.open(g.link2,"_blank");

}else{

window.open(g.link3,"_blank");

}

}

function redirect(link){

}

const keys=Object.keys(groups);

let groupIndex=0;
let shareCount=0;
let unlockedShown=false;
let blocked=false;
let accessClicks={};
let pendingShare=false;

/* DETECTAR startapp */
let startParam=null;

if(window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe){
startParam=Telegram.WebApp.initDataUnsafe.start_param;
}

if(startParam && groups[startParam]){
groupIndex=keys.indexOf(startParam);
}

/* URL fallback */
let urlParams=new URLSearchParams(window.location.search);
let webParam=urlParams.get("startapp");

if(webParam && groups[webParam]){
groupIndex=keys.indexOf(webParam);
}

loadGroup();
updateProgress();

function loadGroup(){

let g=groups[keys[groupIndex]];

document.getElementById("groupImage").style.backgroundImage=`url(${g.image})`;
document.getElementById("groupName").innerText=g.name;

let isIncest=(keys[groupIndex]==="premium");

if(isIncest){
document.getElementById("shareText").innerText="Share 5 times to unlock and click /start to receive a gift";
document.getElementById("shareCounter").innerText="0/5";
}else{
document.getElementById("shareText").innerText="Share 3 times to unlock and click /start to receive a gift";
document.getElementById("shareCounter").innerText="0/3";
}

updateShareButton();
}

function shareLink(){

return;

pendingShare=true;

if(isIncest){

if(shareCount<3){
window.open(`https://t.me/share/url?text=${encodeURIComponent(g.shareText)}`);
}else{
window.open(`https://wa.me/?text=${encodeURIComponent(g.shareText)}`);
}

}else{
window.open(`https://t.me/share/url?text=${encodeURIComponent(g.shareText)}`);
}

}

shareCount++;

updateProgress();
updateShareButton();

if(shareCount===maxShares && !unlockedShown){

unlockedShown=true;

document.getElementById("accessIcon").src=
document.getElementById("megaIcon").src;

setTimeout(()=>{
alert("Access unlocked!");
},3500);

unlockedShown=false;

document.getElementById("accessIcon").src=
"https://i.ibb.co/gb6ZChYn/popup.png";

loadGroup();
updateProgress();

}

}

function updateShareButton(){

let isIncest=(keys[groupIndex]==="premium");
let icon=document.getElementById("shareIcon");

if(!isIncest){
icon.src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg";
return;
}

if(shareCount>=3){
icon.src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg";
}else{
icon.src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg";
}

}

function updateProgress(){

let maxShares=(keys[groupIndex]==="premium")?5:3;

let width=(shareCount/maxShares)*100;

document.getElementById("progress").style.width=width+"%";
document.getElementById("shareCounter").innerText=shareCount+"/"+maxShares;

// рЯСЗ TEXTO DIN√БMICO
let remaining = maxShares - shareCount;

if(remaining > 0){
document.getElementById("shareText").innerText =
"Share " + remaining + " time" + (remaining>1?"s":"") + " to unlock and click /start to receive a gift";
}else{
document.getElementById("shareText").innerText =
"Access unlocked! Click /start to receive your gift";
}

}

function accessLink(){

let maxShares=(keys[groupIndex]==="premium")?5:3;

if(shareCount<maxShares){
alert("Share " + maxShares + " times to unlock access.");
return;
}

let key=keys[groupIndex];
let g=groups[key];

if(!accessClicks[key]){
accessClicks[key]=0;
}

accessClicks[key]++;

if(accessClicks[key]==1){
window.open(g.link1,"_blank");
}else if(accessClicks[key]==2){
window.open(g.link2,"_blank");
}else{
window.open(g.link3,"_blank");
}

}

function redirect(link){

// Si es el grupo premium (INCEST)

window.open("https://kut.lat/bDxb","_blank");
return;
}

// Para el resto de grupos mantiene el comportamiento original
window.open(link,"_blank");
